services:
  bot:
    image: ghcr.io/yoisakiknd/omp-search-agent:latest
    pull_policy: always
    container_name: omp-search-agent
    restart: unless-stopped
    init: true
    stop_grace_period: 40s
    env_file:
      - .env
    volumes:
      - ./runtime/data:/data
      - ./runtime/omp-agent:/home/bun/.omp/agent
